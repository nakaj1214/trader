name: Build Dashboard v2

on:
  push:
    branches: [main]
    paths:
      - 'dashboard-v2/**'
  workflow_dispatch:

concurrency:
  group: build-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: dashboard-v2
        run: npm install

      - name: Copy data files
        run: |
          mkdir -p dashboard-v2/static/data
          cp dashboard/data/*.json dashboard-v2/static/data/ 2>/dev/null || true

      - name: Build
        working-directory: dashboard-v2
        run: npm run build
