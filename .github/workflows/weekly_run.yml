name: Weekly Stock Analysis

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜 UTC 00:00 (JST 09:00)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # secrets は if 式で直接参照できないため env に移す
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Run stock analysis
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src.main

      - name: Commit and push dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 先に最新を取り込んでからコミット（衝突しにくい）
          git pull --rebase origin "${{ github.ref_name }}"

          git add dashboard/data/
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push

      - name: Notify Slack (always)
        if: always() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Weekly Stock Analysis: ${{ job.status }}\nref=${{ github.ref_name }}\nrun=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${SLACK_WEBHOOK_URL}"

