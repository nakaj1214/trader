# 自動AI株式分析 & 追跡ワークフロー 設定ファイル

# スクリーニング設定
screening:
  markets:
    - "sp500"
    - "nasdaq100"
    - "nikkei225"   # Phase 15: 日本株データ収集を有効化
  top_n: 10
  min_market_cap: 10_000_000_000  # 100億ドル以上
  min_avg_dollar_volume_us: 1_000_000    # Phase 23: US株 日次平均売買代金下限（ドル建て、0で無効）
  min_avg_dollar_volume_jp: 500_000_000  # Phase 23: JP株 日次平均売買代金下限（円建て、0で無効）
  exclude_days_to_earnings: 5     # Phase 24: 決算 N 日前の JP 銘柄を警告（0で無効）
  lookback_days: 252              # SMA200 計算のため 252 に変更（30 → 252）
  use_golden_cross_filter: true   # SMA50 > SMA200 のみ通す（false で無効化）
  # スコアリング重み（合計1.0）
  weights:
    price_change_1m: 0.20   # 直近1ヶ月の株価上昇率
    volume_trend: 0.15      # 出来高増加トレンド
    rsi_score: 0.15         # RSIスコア (30-70の中間帯が高評価)
    macd_signal: 0.15       # MACDシグナル
    fifty2w_score: 0.15     # 52週高値モメンタム (Phase 13)
    bb_position: 0.10       # Bollinger Band ポジション（中央〜上限が高評価）
    adx_score: 0.10         # ADX トレンド強度スコア

# AI予測設定
prediction:
  history_days: 90          # 予測に使う過去データの日数
  forecast_days: 5          # 予測する将来の営業日数 (1週間)

# OpenAI設定
openai:
  model: "gpt-4o-mini"      # "gpt-4o" 等に変更可能
  max_tokens: 500

# Google Sheets設定
google_sheets:
  spreadsheet_name: "trade"
  worksheet_name: "predictions"

# Slack設定
slack:
  channel: "#stock-alerts"

# 表示設定
display:
  beginner_mode: true       # 初心者モード (用語解説をレポートに追加)

# LINE通知設定
line:
  enabled: false  # true にするとSlack通知後にLINEでチェックを促す

# 通知設定（チャンネル別有効/無効制御）
notifications:
  slack:
    enabled: true
  line:
    enabled: false  # true にするとSlack通知後にLINEでチェックを促す
  slack_chart: true           # チャート画像を Slack に添付するか（false でテキストのみ）
  chart_lookback_days: 60     # チャート表示日数（取得は max(60, 252) 日分）
  slack_channel_id: ""        # Bot Token 使用時の upload 先チャンネル ID（空なら channel 名から自動解決）

# フェーズ5: 予測ガードレール
guardrail:
  clip_pct: 30.0   # 週次±30% でクリップ
  warn_pct: 20.0   # 週次±20% で警告

# フェーズ8: ポジションサイジング + 損切り規律
sizing:
  vol_target_ann: 0.10      # 目標年率ボラティリティ (ポジションサイズ計算の基準)
  max_weight_cap: 0.20      # 最大保有比率の上限
  stop_loss_multiplier: 1.0 # 損切り水準 = multiplier × 月次ボラティリティ

# フェーズ9: バックテスト品質開示
backtest:
  num_rules_tested: 1        # 推奨: 2以上。pbo/reality_check 算出には最低2、推奨10以上
  num_parameters_tuned: 4
  oos_start: "2025-01-01"
  min_rules_for_pbo: 2       # pbo / reality_check_pvalue を算出する最小 num_rules_tested

# フェーズ17: J-Quants API（日本株ファンダメンタルデータ補完）
jquants:
  enabled: true   # false にすると yfinance のみで動作（Phase 17 以前と同じ）

# フェーズ18: Finnhub ニュース・センチメント（US 株のみ）
finnhub:
  enabled: true   # false にすると従来動作（news_sentiment: null）

# フェーズ19: Financial Modeling Prep（グローバル財務データ最終フォールバック）
fmp:
  enabled: true   # false にすると FMP 補完を無効化

# フェーズ25: Prophet 設定（予測モデルのパラメータ）
prophet:
  interval_width: 0.95           # ⚠️ 変更する場合は compute_prob_up の z 値も要修正
  changepoint_prior_scale: 0.05  # トレンド変化点の感度（0.001〜0.5）
  uncertainty_samples: 1000      # 確率予測のサンプル数（精度 vs 速度）

# Phase 3: 価格系列の統一（Close / Adj Close どちらを使うか）
# "Close" を使用する場合、日本株の配当落ち時に疑似的な価格下落が生じる点に注意。
# 変更する場合は全モジュール（screener / predictor / tracker / enricher / baseline / exporter）への影響を確認すること。
price_column: "Close"

# Phase 1: ウォークフォワード評価設定
walkforward:
  train_weeks: 52      # ルール決定に使う期間（最低52週推奨）
  test_weeks: 13       # 評価期間（1クォーター）
  min_train_weeks: 26  # これ未満のデータ週数ではウィンドウをスキップ
