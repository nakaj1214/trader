<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Stock Predictions Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>AI Stock Predictions</h1>
        <div class="subtitle" id="last-updated"></div>
      </div>
      <div class="header-right">
        <div class="header-stat">
          <div class="header-stat-value" id="header-accuracy-value">-</div>
          <div class="header-stat-label" id="header-accuracy-detail">累計的中率</div>
        </div>
        <nav>
          <a href="index.html" class="active">サマリー</a>
          <a href="accuracy.html">的中率</a>
          <a href="simulator.html">シミュレータ</a>
        </nav>
        <button class="help-btn" id="help-btn" title="ヘルプを表示">?</button>
      </div>
    </div>
  </header>
  <main>
    <div id="stale-alert" class="alert alert-warning" style="display:none"></div>

    <!-- Phase 10: マクロ環境バナー -->
    <div id="macro-banner" style="display:none"></div>

    <section>
      <h2>今週の予測 (<span id="latest-date">-</span>)</h2>
      <div id="prediction-cards" class="card-grid">
        <div class="loading">読み込み中...</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/app.js"></script>
  <script src="js/macro.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
