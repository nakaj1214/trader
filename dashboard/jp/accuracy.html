<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本株 成績 - AI Stock Predictions</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>AI Stock Predictions <span class="market-label">🇯🇵 日本株</span></h1>
        <div class="subtitle" id="last-updated"></div>
      </div>
      <div class="header-right">
        <div class="header-stat">
          <div class="header-stat-value" id="header-accuracy-value">-</div>
          <div class="header-stat-label" id="header-accuracy-detail">予測の当たった割合</div>
        </div>
        <nav>
          <a href="index.html">サマリー</a>
          <a href="accuracy.html" class="active">成績</a>
          <a href="../index.html">← 市場選択</a>
        </nav>
        <button class="help-btn" id="help-btn" title="ヘルプを表示">?</button>
      </div>
    </div>
  </header>
  <main id="accuracy-content">
    <div id="stale-alert" class="alert alert-warning" style="display:none"></div>

    <section>
      <h2>予測の当たった割合</h2>
      <div class="card stat-card">
        <div class="stat-value" id="cumulative-value">-</div>
        <div class="stat-label" id="cumulative-detail"></div>
      </div>
    </section>

    <section>
      <h2>週ごとの予測成績</h2>
      <div class="chart-container">
        <canvas id="weekly-chart"></canvas>
      </div>
    </section>

    <section id="error-analysis-section" style="display:none">
      <h2>予測のズレ分析</h2>
      <div class="card stat-card" id="mae-card">
        <div class="stat-value" id="mae-value">-</div>
        <div class="stat-label">予測のズレ（平均）</div>
      </div>
      <div class="chart-container">
        <canvas id="error-chart"></canvas>
      </div>
      <div id="error-table">
        <div class="loading">読み込み中...</div>
      </div>
    </section>

    <section>
      <h2>銘柄ごとの成績ランキング</h2>
      <div id="ticker-ranking">
        <div class="loading">読み込み中...</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="../js/app.js"></script>
  <script src="../js/accuracy.js"></script>
</body>
</html>
