<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本株 AI Stock Predictions</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>AI Stock Predictions <span class="market-label">🇯🇵 日本株</span></h1>
        <div class="subtitle" id="last-updated"></div>
      </div>
      <div class="header-right">
        <div class="header-stat">
          <div class="header-stat-value" id="header-accuracy-value">-</div>
          <div class="header-stat-label" id="header-accuracy-detail">累計的中率</div>
        </div>
        <nav>
          <a href="index.html" class="active">サマリー</a>
          <a href="accuracy.html">的中率</a>
          <a href="../index.html">← 市場選択</a>
        </nav>
        <button class="help-btn" id="help-btn" title="ヘルプを表示">?</button>
      </div>
    </div>
  </header>
  <main>
    <div id="stale-alert" class="alert alert-warning" style="display:none"></div>

    <!-- 日本株向け注記 -->
    <div class="info-panel" style="display:block; margin-bottom:1rem;">
      <strong>日本株（日経225）</strong> &#x2014;
      価格は円建て表示です。1単元=100株のため最低投資額に注意してください。
      データは yfinance 経由（<code>.T</code> サフィックス）で取得しています。
    </div>

    <!-- 買い時・売り時ガイド -->
    <div class="timing-guide">
      <div class="timing-guide-title">買い時・売り時の目安</div>
      <div class="timing-guide-cols">
        <div class="timing-col-buy">
          <div class="timing-col-title buy-title">買い時のサイン</div>
          <ul class="timing-col">
            <li>予測上昇率がプラス（+）の銘柄</li>
            <li>累計的中率が55%以上（的中率ページで確認）</li>
          </ul>
        </div>
        <div class="timing-col-sell">
          <div class="timing-col-title sell-title">売り時のサイン</div>
          <ul class="timing-col">
            <li>損切り価格を下回ったら即売り（銘柄詳細で確認）</li>
            <li>1週間後に予測期間終了 → 実績を確認して判断</li>
          </ul>
        </div>
      </div>
    </div>

    <section>
      <h2>今週の予測 (<span id="latest-date">-</span>)</h2>
      <div id="prediction-cards" class="card-grid">
        <div class="loading">読み込み中...</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="../js/app.js"></script>
  <script src="../js/index_jp.js"></script>
</body>
</html>
