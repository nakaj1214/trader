<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シミュレータ - AI Stock Predictions</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>AI Stock Predictions</h1>
        <div class="subtitle" id="last-updated"></div>
      </div>
      <div class="header-right">
        <div class="header-stat">
          <div class="header-stat-value" id="header-accuracy-value">-</div>
          <div class="header-stat-label" id="header-accuracy-detail">予測の当たった割合</div>
        </div>
        <nav>
          <a href="index.html">サマリー</a>
          <a href="accuracy.html">成績</a>
          <a href="simulator.html" class="active">シミュレータ</a>
        </nav>
        <button class="help-btn" id="help-btn" title="ヘルプを表示">?</button>
      </div>
    </div>
  </header>
  <main id="simulator-content">
    <div id="stale-alert" class="alert alert-warning" style="display:none"></div>

    <section>
      <h2>投資シミュレータ</h2>
      <div class="sim-input-section">
        <div class="sim-input-row">
          <label for="sim-amount">投資金額 ($)</label>
          <input type="number" id="sim-amount" value="10000" min="1" step="1000">
          <button id="sim-run">シミュレーション実行</button>
        </div>
        <div class="sim-validation-error" id="sim-error">投資金額は1以上の数値を入力してください。</div>
      </div>
    </section>

    <div id="sim-results-area" style="display:none">
      <section>
        <div class="sim-results" id="sim-summary"></div>
      </section>

      <section>
        <h2>週別損益推移</h2>
        <div class="chart-container">
          <canvas id="sim-chart"></canvas>
        </div>
      </section>

      <section>
        <h2>銘柄別損益</h2>
        <div id="sim-table">
          <div class="loading">読み込み中...</div>
        </div>
      </section>
    </div>

    <div id="sim-empty" class="empty-state" style="display:none">
      実績データがありません。予測結果が確定されるまでお待ちください。
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/app.js"></script>
  <script src="js/simulator.js"></script>
</body>
</html>
