<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銘柄詳細 - AI Stock Predictions</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>AI Stock Predictions</h1>
        <div class="header-ticker" id="stock-ticker"></div>
        <div class="subtitle" id="last-updated"></div>
      </div>
      <div class="header-right">
        <div class="header-stat">
          <div class="header-stat-value" id="header-accuracy-value">-</div>
          <div class="header-stat-label" id="header-accuracy-detail">累計的中率</div>
        </div>
        <nav>
          <a href="index.html">サマリー</a>
          <a href="accuracy.html">的中率</a>
          <a href="simulator.html">シミュレータ</a>
        </nav>
        <button class="help-btn" id="help-btn" title="ヘルプを表示">?</button>
      </div>
    </div>
  </header>
  <main id="stock-content">
    <div id="stale-alert" class="alert alert-warning" style="display:none"></div>

    <!-- Phase 5: 予測ガードレール警告 -->
    <div id="sanity-banner" style="display:none"></div>

    <!-- Phase 1: リスク指標 + イベント -->
    <div id="risk-panel" class="info-panel" style="display:none"></div>

    <!-- Phase 8: ポジションサイジング -->
    <div id="sizing-panel" class="info-panel" style="display:none"></div>

    <!-- Phase 2: エビデンス指標 -->
    <div id="evidence-panel" class="info-panel evidence-panel" style="display:none"></div>

    <!-- Phase 3: 選出理由 -->
    <div id="explanations-panel" class="info-panel explanations-panel" style="display:none"></div>

    <section>
      <h2>価格推移</h2>
      <div class="chart-container">
        <canvas id="price-chart"></canvas>
      </div>
    </section>

    <section>
      <h2>予測履歴</h2>
      <div id="history-table">
        <div class="loading">読み込み中...</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/app.js"></script>
  <script src="js/stock.js"></script>
</body>
</html>
