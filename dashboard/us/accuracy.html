<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>米国株 的中率 - AI Stock Predictions</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>AI Stock Predictions <span class="market-label">🇺🇸 米国株</span></h1>
        <div class="subtitle" id="last-updated"></div>
      </div>
      <div class="header-right">
        <div class="header-stat">
          <div class="header-stat-value" id="header-accuracy-value">-</div>
          <div class="header-stat-label" id="header-accuracy-detail">累計的中率</div>
        </div>
        <nav>
          <a href="index.html">サマリー</a>
          <a href="accuracy.html" class="active">的中率</a>
          <a href="../simulator.html">シミュレータ</a>
          <a href="../index.html">← 市場選択</a>
        </nav>
        <button class="help-btn" id="help-btn" title="ヘルプを表示">?</button>
      </div>
    </div>
  </header>
  <main id="accuracy-content">
    <div id="stale-alert" class="alert alert-warning" style="display:none"></div>

    <section>
      <h2>累計的中率</h2>
      <div class="card stat-card">
        <div class="stat-value" id="cumulative-value">-</div>
        <div class="stat-label" id="cumulative-detail"></div>
      </div>
    </section>

    <section>
      <h2>週次的中率推移</h2>
      <div class="chart-container">
        <canvas id="weekly-chart"></canvas>
      </div>
    </section>

    <section id="error-analysis-section" style="display:none">
      <h2>予測誤差分析</h2>
      <div class="card stat-card" id="mae-card">
        <div class="stat-value" id="mae-value">-</div>
        <div class="stat-label">平均予測誤差 (MAE)</div>
      </div>
      <div class="chart-container">
        <canvas id="error-chart"></canvas>
      </div>
      <div id="error-table">
        <div class="loading">読み込み中...</div>
      </div>
    </section>

    <section id="calibration-section" style="display:none">
      <h2>確率校正ダッシュボード</h2>
      <div class="calibration-stats" id="calibration-stats"></div>
      <div class="chart-container">
        <canvas id="calibration-chart"></canvas>
      </div>
      <p class="calibration-note">※ データが30件以上蓄積されると表示されます。</p>
    </section>

    <section id="backtest-hygiene-section" style="display:none">
      <h2>バックテスト品質開示</h2>
      <div id="backtest-hygiene-panel"></div>
    </section>

    <section id="comparison-section" style="display:none">
      <h2>戦略別パフォーマンス比較</h2>
      <p class="comparison-note">※ 取引コスト・スリッページは考慮していません。</p>
      <div class="chart-container">
        <canvas id="comparison-chart"></canvas>
      </div>
      <div id="comparison-table">
        <div class="loading">読み込み中...</div>
      </div>
    </section>

    <section>
      <h2>銘柄別的中率ランキング</h2>
      <div id="ticker-ranking">
        <div class="loading">読み込み中...</div>
      </div>
    </section>

    <section id="alpha-survey-section" style="display:none">
      <h2>アノマリー統計検証</h2>
      <p class="panel-note">※ 参考情報です。スコアリングには反映されていません。</p>
      <div id="alpha-survey-table">
        <div class="loading">読み込み中...</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="../js/app.js"></script>
  <script src="../js/accuracy.js"></script>
</body>
</html>
