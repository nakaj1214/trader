<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>米国株 AI Stock Predictions</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-left">
        <h1>AI Stock Predictions <span class="market-label">🇺🇸 米国株</span></h1>
        <div class="subtitle" id="last-updated"></div>
      </div>
      <div class="header-right">
        <div class="header-stat">
          <div class="header-stat-value" id="header-accuracy-value">-</div>
          <div class="header-stat-label" id="header-accuracy-detail">予測の当たった割合</div>
        </div>
        <nav>
          <a href="index.html" class="active">サマリー</a>
          <a href="accuracy.html">成績</a>
          <a href="../analysis.html">分析</a>
          <a href="../simulator.html">シミュレータ</a>
          <a href="../index.html">← 市場選択</a>
        </nav>
        <button class="help-btn" id="help-btn" title="ヘルプを表示">?</button>
      </div>
    </div>
  </header>
  <main>
    <div id="stale-alert" class="alert alert-warning" style="display:none"></div>

    <!-- Phase 10: マクロ環境バナー -->
    <div id="macro-banner" style="display:none"></div>

    <!-- 買い時・売り時ガイド -->
    <div class="timing-guide">
      <div class="timing-guide-title">いつ買う？ いつ売る？</div>
      <div class="timing-guide-cols">
        <div class="timing-col-buy">
          <div class="timing-col-title buy-title">買いのヒント</div>
          <ul class="timing-col">
            <li>来週「上がる」と予測された銘柄</li>
            <li>成績ページの的中率が55%以上のとき</li>
            <li>市場が安定しているとき（上部バナーに注意マークがないとき）</li>
          </ul>
        </div>
        <div class="timing-col-sell">
          <div class="timing-col-title sell-title">売りのヒント</div>
          <ul class="timing-col">
            <li>設定した最低価格を下回ったら売る（詳細ページで確認）</li>
            <li>1週間後に結果を確認して判断</li>
            <li>上部バナーに注意マークが出たら買いを控える</li>
          </ul>
        </div>
      </div>
    </div>

    <section>
      <h2>今週の予測 (<span id="latest-date">-</span>)</h2>
      <div id="prediction-cards" class="card-grid">
        <div class="loading">読み込み中...</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="../js/app.js"></script>
  <script src="../js/macro.js"></script>
  <script src="../js/index_us.js"></script>
</body>
</html>
