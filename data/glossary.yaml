terms:
  RSI:
    short: "70以上=買われすぎ、30以下=売られすぎ"
    detail: >
      Relative Strength Index（相対力指数）。一定期間の値上がり幅と値下がり幅から算出。
      70を超えると過熱感あり、30を下回ると売られすぎと判断される。
      一般的に14日間で計算される。
  MACD:
    short: "トレンドの方向と強さを示す指標"
    detail: >
      Moving Average Convergence Divergence。短期(12日)と長期(26日)の
      指数平滑移動平均の差。シグナルライン(9日平均)との交差が売買サインとなる。
      MACDがシグナルを上抜け=買いサイン、下抜け=売りサイン。
  PER:
    short: "株価の割安/割高を測る指標。低い=割安"
    detail: >
      Price Earnings Ratio（株価収益率）。株価÷1株あたり利益で算出。
      業種平均と比較して低ければ割安と判断される。S&P500の平均PERは約20〜25倍。
  出来高:
    short: "一定期間に売買された株数"
    detail: >
      出来高が多い=その銘柄への注目度が高い。急増は大きな値動きの前兆になることがある。
      平均出来高と比較して判断するのが一般的。
  時価総額:
    short: "会社全体の株式の合計価値"
    detail: >
      株価×発行済株式数で算出。大型株(時価総額が大きい)は値動きが安定的、
      小型株は値動きが激しい傾向がある。一般に100億ドル以上を大型株と呼ぶ。
  ティッカー:
    short: "銘柄の略称コード（例: AAPL=Apple）"
    detail: >
      株式市場で各企業を識別するための短い英字コード。
      米国株は1〜5文字（例: AAPL, MSFT, GOOGL）、
      日本株は4桁の数字+.T（例: 7203.T=トヨタ）。
  終値:
    short: "その日の取引終了時の株価"
    detail: >
      市場の取引時間が終了した時点での最終取引価格。
      米国市場は16:00 ET、日本市場は15:00 JST。
      多くの分析やチャートはこの終値を基準に作成される。
  移動平均線:
    short: "一定期間の株価平均を線にしたもの"
    detail: >
      過去N日間の終値の平均を毎日計算してつないだ線。
      短期(5日/25日)と長期(75日/200日)を組み合わせて使う。
      短期線が長期線を上抜け=ゴールデンクロス(買いサイン)。
  信頼区間:
    short: "予測のブレ幅。小さいほど予測に自信あり"
    detail: >
      統計的に予測値がどの範囲に収まるかを示す指標。
      例えば「±3.2%」なら、実際の値が予測値の上下3.2%以内に
      収まる可能性が高いことを意味する。
  予測上昇率:
    short: "AIが予測する来週の値上がり幅(%)"
    detail: >
      現在の株価に対して、来週どれだけ値上がりするかをAIが予測した割合。
      例えば+6.0%なら、$100の株が$106になると予測していることを意味する。
  スクリーニング:
    short: "条件を設定して銘柄を絞り込むこと"
    detail: >
      多数の銘柄の中から、特定の条件（株価上昇率、出来高、
      テクニカル指標など）を満たす銘柄を自動的にフィルタリングする作業。
  的中率:
    short: "予測が当たった割合"
    detail: >
      過去の予測のうち、実際に予測通りの方向（上昇/下落）に動いた割合。
      例えば10回予測して7回当たれば的中率70%。
      一般に60%以上あれば優秀とされる。
